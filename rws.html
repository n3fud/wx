<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NWS State College Regional Weather Summary</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#0a1e2e;
    color:#fff;
    padding:20px;
}
#summary{
    white-space: pre-wrap;
    background:#111;
    padding:15px;
    border-radius:6px;
    border:1px solid #444;
}
h1{
    color:#4fc3f7;
}
</style>
</head>

<body>

<h1>Regional Weather Summary – NWS State College</h1>
<div id="summary">Loading latest summary...</div>

<script>

async function loadRWS(){

    try {

        // Get list of latest RWS products for State College (CTP)
        const listResponse = await fetch(
            "https://api.weather.gov/products/types/RWS/locations/CTP"
        );
        const listData = await listResponse.json();

        // Get the latest product ID
        const latestID = listData["@graph"][0].id;

        // Fetch the full product text
        const productResponse = await fetch(latestID);
        const productData = await productResponse.json();

        document.getElementById("summary").textContent = productData.productText;

    } catch(error){

        document.getElementById("summary").textContent =
            "Unable to load weather summary.";

        console.error(error);

    }

}

loadRWS();

</script>

</body>
</html>
