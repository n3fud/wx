<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NWS State College Regional Weather Summary</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#0b1d2a;
    color:white;
    padding:20px;
}

#summary{
    white-space: pre-wrap;
    background:#111;
    padding:15px;
    border-radius:6px;
    border:1px solid #444;
}
</style>
</head>

<body>

<h2>NWS State College – Regional Weather Summary V2</h2>
<div id="summary">Loading...</div>

<script>

async function loadRWS(){

    try{

        const list = await fetch("https://api.weather.gov/products/types/RWS/locations/CTP");
        const listData = await list.json();

        // correct property name
        const latestProductURL = listData["@graph"][0]["@id"];

        const product = await fetch(latestProductURL);
        const productData = await product.json();

        document.getElementById("summary").textContent =
            productData.productText;

    }
    catch(err){

        document.getElementById("summary").textContent =
            "Unable to load weather summary.";

        console.error(err);

    }

}

loadRWS();

</script>

</body>
</html>
